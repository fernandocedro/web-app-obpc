<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <title>Obpc School - Leitura Diária</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Funnel+Sans:wght@400;600&family=Manrope:wght@400;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Boldonse&family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Manrope:wght@200..800;1,200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Unbounded:wght@200..900&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html, body {
            height: 100%;
        }
        
        body {
            background: #1F1C1C;
            color: #fff;
            font-family: "Funnel Sans", sans-serif;
            display: flex;
            flex-direction: column;
        }
        
        a { text-decoration: none; color: inherit; }
        
        /* cabeçalho */
        .container-header { 
            display: flex; flex-direction: column; align-items: center; 
            background: #1F1C1C; padding: 15px 0; 
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-top { display: flex; align-items: center; justify-content: center; width: 100%; padding: 10px; }
        .header-top h1 { font-family: 'Anton', sans-serif; font-size: 1.5rem; letter-spacing: 2px; color: #E25402; margin: 0; }
        .header-top h1 span { color: #fff; }
        .header-top-line { width: 150px; height: 2px; background: #FBBDA1; margin: 5px auto; }
        
        /* Conteúdo principal para permitir scroll */
        .main-content {
            flex-grow: 1; 
            padding: 1rem;
            padding-bottom: 80px; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .main-content h2 {
            font-size: 1.8rem;
            color: #FBBDA1;
            margin-bottom: 1rem;
        }

        /* --- ESTILOS DAS ABAS --- */
        .tabs-container {
            display: flex;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
        }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #ccc;
            padding: 15px 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Funnel Sans", sans-serif;
            font-weight: bold;
        }
        .tab-btn.active {
            color: #FBBDA1;
            border-bottom: 3px solid #E25402;
        }
        .tab-btn:hover:not(.active) {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        /* cards de leitura */
        .reading-list-container {
            display: none; /* Escondido por padrão */
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 600px;
        }
        .reading-list-container.active {
            display: flex; /* Mostra apenas a lista ativa */
        }

        .reading-plan-card {
            background: #000000; 
            border-radius: 12px; 
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative; 
            width: 100%;
            text-align: left;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reading-plan-card .date {
            font-size: 0.9rem;
            font-weight: bold;
            color: #888;
            margin-bottom: 0.5rem;
        }
        .reading-plan-card .title { 
            font-size: 1.2rem;
            font-weight: bold; 
            color: #FBBDA1; 
            margin-bottom: 0.5rem; 
        }
        .reading-plan-card .verse {
            font-size: 1rem;
            opacity: .8; 
            margin-bottom: 0.5rem;
            font-style: italic;
        }
        .reading-plan-card .text {
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        /* Botão de leitura */
        .read-button {
            background-color: #1F1C1C;
            color: #fff;
            border: 1px solid #333;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
            width: 100%;
            font-size: 1rem;
        }
        .read-button:hover {
            background-color: #E25402;
            border-color: #E25402;
        }

        /* Estilo do botão quando está na aba de terminados */
        .read-button.completed {
            background-color: #28a745;
            border-color: #28a745;
        }
        .read-button.completed:hover {
            background-color: #dc3545;
            border-color: #dc3545;
            color: #fff;
        }

        .loading-message, .empty-message {
            color: #ccc;
            padding: 20px;
            text-align: center;
            width: 100%;
        }
        
        /* Estilos do rodapé */
        .container-menun-inferior {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
            z-index: 10;
        }

        .container-footer {
            display: flex;
            justify-content: space-around;
            background-color: rgba(0, 0, 0, 0.9);
            padding: 10px 0;
            position: fixed;
            border-radius: 50px;
            bottom: 52px;
            width: 85%;
            z-index: 10;
            box-shadow:  rgba(255, 255, 255, 0.3) 0px 4px 15px;
        }
        .container-footer a {
            color: white;
            font-size: 1.5rem;
            padding: 10px;
        }
        .container-footer i {
            color: #FBBDA1;
            font-size: 1.5rem;
        }
        
        /* menu lateral */
        .menu-oculto { 
            position: fixed; top: 0; right: -100%; width: 250px; height: 100%; 
            background: #000000; transition: right .5s ease-in-out; z-index: 999; 
            display: flex; flex-direction: column; justify-content: space-between;
            padding-top: 50px;
            padding-bottom: 20px;
            overflow-y: auto;
        }
        .menu-oculto.active { right: 0; }
        .btn-fecharOculto { 
            position: absolute; top: 10px; right: 15px; font-size: 1.5rem; color: #fff; cursor: pointer;
        }
        .menu-opcoes-barra { 
            padding: 15px 20px;
            color: #fff;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .menu-opcoes-barra:hover { background-color: rgba(255, 255, 255, 0.1); }
        .menu-opcoes-barra a { text-decoration: none; color: white; width: 100%; }
        .menu-opcoes-barra i { margin-right: 10px; color: #FBBDA1; }
        
        .menu-footer { padding: 15px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .perfil-image { display: flex; align-items: center; margin-bottom: 15px; }
        .perfil-image img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; margin-right: 10px; object-fit: cover; }
        .user-names { display: flex; flex-direction: column; }
        #menu-user-name { font-weight: bold; color: #ffffff; }
        #menu-user-surname { font-size: 0.8em; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="app-container">
        <header class="container-header">
            <div class="header-top">
                <img src="./img/logo.png" alt="Logo OBPC">
            </div>
            <div class="header-top-line"></div>
        </header>

        <div class="main-content">
            <h2>Plano de Leitura Diária</h2>
            
            <div class="tabs-container">
                <button class="tab-btn active" data-target="reading-pending-list">Leitura</button>
                <button class="tab-btn" data-target="reading-completed-list">Terminados</button>
            </div>

            <div id="reading-pending-list" class="reading-list-container active">
                <div class="loading-message">Carregando plano de leitura...</div>
            </div>

            <div id="reading-completed-list" class="reading-list-container">
                <div class="loading-message">Carregando plano de leitura...</div>
            </div>
        </div>

        <div class="container-menun-inferior">
            <footer class="container-footer">
                <div class="home">
                    <a href="index.html" id="home-link"><i class="fa-solid fa-house"></i></a>
                </div>
                <div class="oferta">
                    <a href="generoso.html" ><i class="fa-solid fa-heart"></i></a>
                </div>
                <div class="datas">
                    <a href="events.html"><i class="fa-solid fa-calendar-day"></i></a>
                </div>
                <div class="mais">
                    <i class="fa-solid fa-bars" id="btn-abrir-menu"></i>
                </div>
            </footer>
        </div>
    </div>

    <div class="menu-oculto" id="menu-oculto">
        <div>
            <div class="btn-fecharOculto" id="btn-fechar-menu">x</div>
           <div class="menu-opcoes">
                <div class="menu-opcoes-barra"><a href="biblia.html"><i class="fa-solid fa-book-bible"></i> Bíblia </a></div>
                <div class="menu-opcoes-barra"><a href="index.html"><i class="fa-solid fa-bell"></i> Notificações</a></div>
                <div class="menu-opcoes-barra"><a href="notes.html"><i class="fa-solid fa-note-sticky"></i> Anotações</a></div>
                <div class="menu-opcoes-barra"><a href="leitura-diaria.html"><i class="fa-regular fa-calendar-check"></i> Leitura Diaria</a></div>
                <div class="menu-opcoes-barra"><a href="oracao.html"><i class="fa-solid fa-hands-praying"></i> Oração</a></div>
                <div class="menu-opcoes-barra"><a href="videos.html"><i class="fa-solid fa-circle-play"></i> Videos</a></div>
                <div class="menu-opcoes-barra"><a href="departamentos.html"><i class="fa-solid fa-id-card-clip"></i> Departamentos</a></div>
            </div>
        </div>
        <div class="menu-footer">
            <div class="perfil-image">
                <img id="menu-profile-img" src="https://placehold.co/50x50/E25402/FFFFFF" alt="Perfil">
                <div class="user-names">
                    <span id="menu-user-name">Carregando...</span>
                    <span id="menu-user-surname"></span>
                </div>
            </div>
            <div class="menu-opcoes-barra" id="logout-button" style="cursor:pointer;"><i class="fa-solid fa-right-from-bracket"></i> Sair</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 🔥 Configuração Firebase
        let firebaseConfig;
        let appId = "default-app-id";

        if (typeof __firebase_config !== 'undefined' && typeof __app_id !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
            appId = __app_id;
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyArteycUkaN5-dClQ28oHSl-NoiL-s4NaY",
                authDomain: "app-obpc-49823.firebaseapp.com",
                projectId: "app-obpc-49823",
                storageBucket: "app-obpc-49823.firebasestorage.app",
                messagingSenderId: "690083146419",
                appId: "1:690083146419:web:c03301f1aca7dd2d299ec6",
                measurementId: "G-KJPSSSC575"
            };
        }
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        setPersistence(auth, browserLocalPersistence);

        // Elementos do DOM
        const pendingList = document.getElementById('reading-pending-list');
        const completedList = document.getElementById('reading-completed-list');
        const menuUserName = document.getElementById('menu-user-name');
        const menuUserSurname = document.getElementById('menu-user-surname');
        const menuProfileImg = document.getElementById('menu-profile-img');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const listContainers = document.querySelectorAll('.reading-list-container');

        // Lógica de troca de abas
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove classe active de todos os botões e listas
                tabBtns.forEach(b => b.classList.remove('active'));
                listContainers.forEach(l => l.classList.remove('active'));

                // Adiciona classe active no botão clicado e na lista correspondente
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
            });
        });

        // Função para buscar ou criar o documento de perfil do usuário no Firestore
        const fetchOrCreateUserProfile = async (user, appId) => {
            if (!user) return;
            try {
                const userRef = doc(db, `artifacts/${appId}/users/${user.uid}/profile/profile_data`);
                const docSnap = await getDoc(userRef);

                if (docSnap.exists()) {
                    const profileData = docSnap.data();
                    const fullName = `${profileData.firstName || ''} ${profileData.lastName || ''}`.trim();
                    menuUserName.textContent = fullName || 'Usuário';
                    menuUserSurname.textContent = '';
                    menuProfileImg.src = profileData.profileImageUrl || 'https://placehold.co/50x50/E25402/FFFFFF';
                } else {
                    const defaultProfile = {
                        firstName: user.displayName ? user.displayName.split(' ')[0] : 'Usuário',
                        lastName: user.displayName ? user.displayName.split(' ').slice(1).join(' ') : '',
                        profileImageUrl: user.photoURL || 'https://placehold.co/50x50/E25402/FFFFFF'
                    };
                    await setDoc(userRef, defaultProfile, { merge: true });
                    menuUserName.textContent = defaultProfile.firstName;
                    menuUserSurname.textContent = defaultProfile.lastName;
                    menuProfileImg.src = defaultProfile.profileImageUrl;
                }
            } catch (error) {
                console.error("Erro ao buscar dados do perfil:", error);
                menuUserName.textContent = 'Usuário';
                menuProfileImg.src = 'https://placehold.co/50x50/E25402/FFFFFF';
            }
        };

        // Função para verificar se a lista está vazia e exibir mensagem
        const checkEmptyLists = () => {
            if (pendingList.children.length === 0) {
                pendingList.innerHTML = '<div class="empty-message">Nenhuma leitura pendente. Parabéns! 🎉</div>';
            }
            if (completedList.children.length === 0) {
                completedList.innerHTML = '<div class="empty-message">Nenhuma leitura terminada ainda.</div>';
            }
        };

        // Função para buscar e renderizar o plano de leitura
        const fetchAndRenderReadingPlan = (user) => {
            if (!user) {
                pendingList.innerHTML = '<p class="error-message">Erro: Usuário não autenticado.</p>';
                completedList.innerHTML = '';
                return;
            }

            const readingPlansRef = collection(db, `artifacts/${appId}/public/data/readingPlans`);
            const q = query(readingPlansRef, orderBy("date", "asc"));
            
            onSnapshot(q, async (snapshot) => {
                pendingList.innerHTML = '';
                completedList.innerHTML = '';
                
                if (snapshot.empty) {
                    pendingList.innerHTML = '<div class="empty-message">Nenhum plano de leitura encontrado no sistema.</div>';
                    completedList.innerHTML = '<div class="empty-message">Nenhum plano de leitura encontrado no sistema.</div>';
                    return;
                } 

                const userReadingsRef = doc(db, `artifacts/${appId}/users/${user.uid}/readings/plan_progress`);
                const userReadingsSnap = await getDoc(userReadingsRef);
                const userReadings = userReadingsSnap.exists() ? userReadingsSnap.data() : {};

                snapshot.forEach((docSnap) => {
                    const plan = docSnap.data();
                    const isRead = userReadings[docSnap.id] === true;

                    // Tratamento para formatar a data
                    let dataFormatada = plan.date;
                    if (plan.date) {
                        const [ano, mes, dia] = plan.date.split('-');
                        const dataObj = new Date(ano, mes - 1, dia);
                        dataFormatada = dataObj.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long' });
                    }

                    // Criação do card
                    const card = document.createElement('div');
                    card.className = 'reading-plan-card';
                    card.dataset.docId = docSnap.id;
                    
                    const btnClass = isRead ? 'read-button completed' : 'read-button';
                    const btnText = isRead ? '<i class="fa-solid fa-check-double"></i> Concluído (Desfazer)' : 'Marcar como Lido';

                    card.innerHTML = `
                        <p class="date">${dataFormatada}</p>
                        <p class="title">${plan.title}</p>
                        <p class="verse">${plan.verse}</p>
                        <p class="text">${plan.text}</p>
                        <button class="${btnClass}">${btnText}</button>
                    `;

                    // Lógica de Clique no Botão
                    const button = card.querySelector('.read-button');
                    button.addEventListener('click', async () => {
                        const docId = card.dataset.docId;
                        
                        // Busca o status mais atualizado direto do banco
                        const currentSnap = await getDoc(userReadingsRef);
                        const currentData = currentSnap.exists() ? currentSnap.data() : {};
                        const currentlyRead = currentData[docId] === true;

                        const newState = !currentlyRead;
                        
                        try {
                            button.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Atualizando...';
                            
                            // Salva no banco de dados
                            await setDoc(userReadingsRef, { [docId]: newState }, { merge: true });
                            
                            // Move o card visualmente e atualiza o estilo
                            if (newState) {
                                // Foi marcado como lido
                                button.className = 'read-button completed';
                                button.innerHTML = '<i class="fa-solid fa-check-double"></i> Concluído (Desfazer)';
                                completedList.appendChild(card);
                            } else {
                                // Foi desmarcado
                                button.className = 'read-button';
                                button.textContent = 'Marcar como Lido';
                                pendingList.appendChild(card);
                            }
                            
                            // Remove mensagens de vazio se houver e verifica as listas
                            document.querySelectorAll('.empty-message').forEach(el => el.remove());
                            checkEmptyLists();

                        } catch (error) {
                            console.error("Erro ao atualizar o status de leitura:", error);
                            alert("Erro ao atualizar. Verifique sua conexão e tente novamente.");
                            // Restaura o botão em caso de erro
                            button.className = btnClass;
                            button.innerHTML = btnText;
                        }
                    });

                    // Insere na lista correta (Leitura ou Terminados)
                    if (isRead) {
                        completedList.appendChild(card);
                    } else {
                        pendingList.appendChild(card);
                    }
                });

                // Verifica se alguma das listas ficou vazia após o carregamento inicial
                checkEmptyLists();
                
            }, (error) => {
                console.error("Erro ao carregar o plano de leitura: ", error);
                pendingList.innerHTML = '<p class="error-message">Erro ao carregar o plano de leitura.</p>';
            });
        };

        // Observa o estado da autenticação do usuário
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await fetchOrCreateUserProfile(user, appId);
                fetchAndRenderReadingPlan(user);
            } else {
                window.location.href = "index.html";
            }
        });

        // Event Listeners da UI (Menu e Logout)
        document.getElementById("logout-button").addEventListener("click", () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            }).catch((error) => {
                console.error("Erro ao fazer logout:", error);
            });
        });

        document.getElementById("btn-abrir-menu").addEventListener("click", () => {
            document.getElementById("menu-oculto").classList.add("active");
        });

        document.getElementById("btn-fechar-menu").addEventListener("click", () => {
            document.getElementById("menu-oculto").classList.remove("active");
        });
    </script>
</body>
</html>
